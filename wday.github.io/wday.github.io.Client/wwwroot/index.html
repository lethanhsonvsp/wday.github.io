<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ngọc Nam ♥ Lan Anh — 18.10.2026</title>
    <meta name="description" content="Thiệp cưới Ngọc Nam & Lan Anh — 18.10.2026. Trân trọng kính mời." />
    <meta property="og:title" content="Ngọc Nam ♥ Lan Anh — Save The Date 18.10.2026" />
    <meta property="og:description" content="Trân trọng kính mời bạn đến chung vui cùng chúng tôi." />
    <meta property="og:image" content="images/gallery/wedding-05.jpg" />
    <base href="/" />

    <!-- Typography: Playfair Display (editorial), Great Vibes (chữ ký),
         Cormorant Garamond (quote), Montserrat (label) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap"
          rel="stylesheet" />

    <link rel="stylesheet" href="css/wedding.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <!-- Màn hình chờ trong lúc tải Blazor WebAssembly -->
        <div class="wd-boot">
            <div class="wd-boot-inner">
                <div class="wd-boot-names">Ngọc Nam &amp; Lan Anh</div>
                <div class="wd-boot-date">18 . 10 . 2026</div>
                <div class="wd-boot-line"></div>
                <div class="wd-boot-hint">Đang mở thiệp…</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Đã xảy ra lỗi không mong muốn.
        <a href="." class="reload">Tải lại trang</a>
        <span class="dismiss">🗙</span>
    </div>

    <!-- Thư viện QR nhẹ (chỉ dùng cho section Mừng cưới).
         Nếu CDN không tải được, client tự fallback hiển thị số tài khoản dạng chữ. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>

    <script src="js/wedding.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
