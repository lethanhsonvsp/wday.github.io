name: Deploy Wedding Invitation to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Blazor WebAssembly client
        run: dotnet publish wday.github.io/wday.github.io.Client -c Release -o publish

      # Repo dạng <owner>.github.io được serve tại gốc "/",
      # repo thường được serve tại "/<tên-repo>/" — tự chỉnh <base href> cho khớp.
      - name: Fix base href for project pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          if [ "${REPO_NAME,,}" != "${OWNER,,}.github.io" ]; then
            sed -i "s|<base href=\"/\" />|<base href=\"/${REPO_NAME}/\" />|" publish/wwwroot/index.html
            echo "Base href set to /${REPO_NAME}/"
          else
            echo "User site — base href stays /"
          fi

      - name: SPA fallback + disable Jekyll
        run: |
          cp publish/wwwroot/index.html publish/wwwroot/404.html
          touch publish/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
